{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: linktracker-gateway
  namespace: {{ .Values.namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  {{- if .Values.gateway.staticIpName }}
  addresses:
    - type: NamedAddress
      value: {{ .Values.gateway.staticIpName | quote }}
  {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    {{- if .Values.gateway.tls.enabled }}
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.gateway.tls.secretName }}
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: linktracker-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: linktracker-gateway
  {{- if .Values.gateway.tls.enabled }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: backend
          port: {{ .Values.backend.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /s/
      backendRefs:
        - name: backend
          port: {{ .Values.backend.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: {{ .Values.frontend.port }}
{{- end }}
