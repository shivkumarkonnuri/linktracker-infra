{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: linktracker-backend-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  linktracker-backend.json: |
    {
      "title": "LinkTracker Backend",
      "uid": "linktracker-backend",
      "tags": ["linktracker", "backend"],
      "timezone": "Asia/Kolkata",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate by Handler",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"linktracker-prod\"}[5m])) by (handler)",
              "legendFormat": "{{ "{{handler}}" }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (4xx/5xx %)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "percent", "max": 100, "min": 0, "custom": { "drawStyle": "line", "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{namespace=\"linktracker-prod\", status=~\"4..|5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"linktracker-prod\"}[5m]))",
              "legendFormat": "error %",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latency Percentiles (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 5 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_highr_seconds_bucket{namespace=\"linktracker-prod\"}[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_highr_seconds_bucket{namespace=\"linktracker-prod\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_highr_seconds_bucket{namespace=\"linktracker-prod\"}[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 4,
          "title": "Response Size by Handler",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "drawStyle": "line", "fillOpacity": 10 } },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(http_response_size_bytes_sum{namespace=\"linktracker-prod\"}[5m])) by (handler) / sum(rate(http_response_size_bytes_count{namespace=\"linktracker-prod\"}[5m])) by (handler)",
              "legendFormat": "{{ "{{handler}}" }} avg size",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {}
          }
        ]
      }
    }
{{- end }}
