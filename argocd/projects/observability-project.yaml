apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: >-
    Platform-level observability stack (Prometheus, Grafana, Alertmanager,
    Loki) for the LinkTracker environment. Kept separate from the
    'linktracker' AppProject since this manages cluster-wide monitoring
    infrastructure, not the application itself.

  sourceRepos:
    - https://github.com/shivkumarkonnuri/linktracker-infra

  destinations:
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  clusterResourceBlacklist: []

  sourceNamespaces:
    - argocd
