kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: linktracker-uat
networking:
  disableDefaultCNI: true
  podSubnet: "10.226.0.0/16"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 9080
        protocol: TCP
      - containerPort: 443
        hostPort: 9443
        protocol: TCP

  - role: worker
    labels:
      workload: app

  - role: worker
    labels:
      workload: app
