---
- name: Add jetstack Helm repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io

- name: Install/upgrade cert-manager with Gateway API support enabled
  kubernetes.core.helm:
    name: "{{ cert_manager_release_name }}"
    chart_ref: jetstack/cert-manager
    chart_version: "{{ cert_manager_chart_version }}"
    release_namespace: "{{ cert_manager_namespace }}"
    create_namespace: true
    wait: true
    values:
      crds:
        enabled: true
      config:
        apiVersion: controller.config.cert-manager.io/v1alpha1
        kind: ControllerConfiguration
        enableGatewayAPI: "{{ cert_manager_enable_gateway_api }}"

- name: Wait for cert-manager controller rollout
  kubernetes.core.k8s_info:
    kind: Deployment
    name: cert-manager
    namespace: "{{ cert_manager_namespace }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 180

- name: Confirm enable-gateway-api flag is present on controller
  kubernetes.core.k8s_info:
    kind: Deployment
    name: cert-manager
    namespace: "{{ cert_manager_namespace }}"
  register: cert_manager_deploy

- name: Assert Gateway API flag actually made it into the running container args
  ansible.builtin.assert:
    that: >-
      cert_manager_deploy.resources[0].spec.template.spec.containers[0].args
      | select('search', '--enable-gateway-api=true') | list | length > 0
    fail_msg: >-
      cert-manager was installed but --enable-gateway-api=true is missing
      from the controller args. Check the cert-manager chart version
      supports config.enableGatewayAPI (v1.15+).
    success_msg: "cert-manager Gateway API support confirmed enabled."
