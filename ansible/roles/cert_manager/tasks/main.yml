---
- name: Add jetstack Helm repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io

- name: Install/upgrade cert-manager with Gateway API support enabled
  kubernetes.core.helm:
    name: "{{ cert_manager_release_name }}"
    chart_ref: jetstack/cert-manager
    chart_version: "{{ cert_manager_chart_version }}"
    release_namespace: "{{ cert_manager_namespace }}"
    create_namespace: true
    wait: true
    values:
      crds:
        enabled: true
      config:
        apiVersion: controller.config.cert-manager.io/v1alpha1
        kind: ControllerConfiguration
        enableGatewayAPI: "{{ cert_manager_enable_gateway_api }}"

- name: Wait for cert-manager controller rollout
  kubernetes.core.k8s_info:
    kind: Deployment
    name: cert-manager
    namespace: "{{ cert_manager_namespace }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 180

- name: Confirm Gateway API support is present in the mounted controller config
  kubernetes.core.k8s_info:
    kind: ConfigMap
    name: "{{ cert_manager_release_name }}"
    namespace: "{{ cert_manager_namespace }}"
  register: cert_manager_config

- name: Assert enableGatewayAPI is set in the controller ConfigMap
  ansible.builtin.assert:
    that: >-
      'enableGatewayAPI' in (cert_manager_config.resources[0].data | string)
      and 'true' in (cert_manager_config.resources[0].data | string)
    fail_msg: >-
      cert-manager ConfigMap does not appear to contain enableGatewayAPI: true.
      Check the chart version supports config.enableGatewayAPI (v1.15+).
    success_msg: "cert-manager Gateway API support confirmed enabled in controller config."
