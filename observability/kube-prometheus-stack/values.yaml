# Values passed through to the kube-prometheus-stack subchart.
# Nest everything under kube-prometheus-stack: since that's the
# dependency alias in Chart.yaml.

kube-prometheus-stack:

  # --- Critical: without this, Prometheus only picks up ServiceMonitors
  # that carry the chart's own release label. We want it to discover ANY
  # ServiceMonitor in the cluster (e.g. the one we add to the linktracker
  # chart), so set this to false.
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

      retention: 7d
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 1Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: standard-rwo
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  prometheusOperator:
    admissionWebhooks:
      certManager:
        enabled: false
      patch:
        enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  grafana:
    adminPassword: "NewStrongPassword123!"
    persistence:
      enabled: true
      storageClassName: standard-rwo
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    defaultDashboardsTimezone: Asia/Kolkata

  windowsMonitoring:
    enabled: false

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi

  nodeExporter:
    enabled: true

  kubeStateMetrics:
    enabled: true

  # --- GKE is a managed control plane: these components aren't reachable
  # for scraping the way they are on self-managed clusters, and enabling
  # them just creates broken Service objects in kube-system. Standard
  # recommendation for GKE/EKS/AKS.
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  coreDns:
    enabled: false
